spring:
  application:
    name: basket-service

  datasource:
    url: jdbc:h2:mem:basketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # In-memory DB only. In production the schema is owned by a migration
      # tool (Flyway/Liquibase) and ddl-auto is set to "validate" or "none".
      ddl-auto: create-drop
    # Keep the persistence context bound to the transaction, not the request.
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: 8080

logging:
  level:
    com.example.basketservice: INFO
